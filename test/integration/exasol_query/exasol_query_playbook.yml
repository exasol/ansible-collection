---
- hosts: localhost
  gather_facts: false
  collections:
    - exasol.exasol
  module_defaults:
    exasol.exasol.exasol_query:
      login_host: "{{ login_host }}"
      login_port: "{{ login_port }}"
      login_user: "{{ login_user }}"
      login_password: "{{ login_password }}"
      validate_certs: "{{ validate_certs }}"
      certificate_fingerprint: "{{ certificate_fingerprint | default('') }}"
  tasks:
    - name: Setup Exasol test environment
      import_role:
        name: exasol.exasol.setup_exasol
      vars:
        exasol_host: "{{ login_host }}"
        exasol_port: "{{ login_port }}"
        exasol_user: "{{ login_user }}"
        exasol_password: "{{ login_password }}"
        exasol_validate_certs: "{{ validate_certs }}"
        exasol_certificate_fingerprint: "{{ certificate_fingerprint | default('') }}"

    - name: Run exasol_query scenarios
      block:
        - name: Pre-clean exasol_query backend test schemas
          exasol.exasol.exasol_query:
            query:
              - DROP SCHEMA IF EXISTS {{ test_schema }} CASCADE
              - DROP SCHEMA IF EXISTS {{ test_schema }}_CHECK_MODE CASCADE

        - name: Scenario - design metadata query returns database version
          exasol.exasol.exasol_query:
            query: >-
              SELECT PARAM_VALUE
              FROM EXA_METADATA
              WHERE PARAM_NAME = 'databaseProductVersion'
          register: exasol_query_metadata_version

        - name: Verify design metadata query result
          ansible.builtin.assert:
            that:
              - exasol_query_metadata_version is not changed
              - exasol_query_metadata_version.query_result | length == 1
              - exasol_query_metadata_version.query_result[0].PARAM_VALUE | string | length > 0
              - exasol_query_metadata_version.execution_time_ms | length == 1

        - name: Scenario - single SELECT returns rows and does not change
          exasol.exasol.exasol_query:
            query: SELECT 1 AS A
          register: exasol_query_select

        - name: Verify single SELECT result
          ansible.builtin.assert:
            that:
              - exasol_query_select is not changed
              - exasol_query_select.query_result | length == 1
              - exasol_query_select.query_result[0].A | string == "1"
              - exasol_query_select.query_all_results | length == 1
              - exasol_query_select.executed_queries == ["SELECT 1 AS A"]
              - exasol_query_select.rowcount | length == 1
              - exasol_query_select.execution_time_ms | length == 1

        - name: Scenario - list of statements runs in order on one connection
          exasol.exasol.exasol_query:
            query:
              - CREATE SCHEMA {{ test_schema }}
              - CREATE OR REPLACE TABLE {{ test_schema }}.QUERY_TEST
                (ID DECIMAL(18, 0), NOTE VARCHAR(200))
              - INSERT INTO {{ test_schema }}.QUERY_TEST VALUES (1, 'backend')
              - SELECT COUNT(*) AS ROW_COUNT, MIN(NOTE) AS NOTE
                FROM {{ test_schema }}.QUERY_TEST
          register: exasol_query_batch

        - name: Verify list statement result shape
          ansible.builtin.assert:
            that:
              - exasol_query_batch is changed
              - exasol_query_batch.executed_queries == expected_batch_queries
              - exasol_query_batch.query_all_results | length == expected_batch_queries | length
              - exasol_query_batch.rowcount | length == expected_batch_queries | length
              - exasol_query_batch.execution_time_ms | length == expected_batch_queries | length
              - exasol_query_batch.query_result | length == 1
              - exasol_query_batch.query_result[0].ROW_COUNT | string == "1"
              - exasol_query_batch.query_result[0].NOTE == "backend"
          vars:
            expected_batch_queries:
              - CREATE SCHEMA {{ test_schema }}
              - CREATE OR REPLACE TABLE {{ test_schema }}.QUERY_TEST
                (ID DECIMAL(18, 0), NOTE VARCHAR(200))
              - INSERT INTO {{ test_schema }}.QUERY_TEST VALUES (1, 'backend')
              - SELECT COUNT(*) AS ROW_COUNT, MIN(NOTE) AS NOTE
                FROM {{ test_schema }}.QUERY_TEST

        - name: Scenario - positional args bind correctly
          exasol.exasol.exasol_query:
            query: SELECT ? AS A
            positional_args:
              - 42
          register: exasol_query_positional

        - name: Verify positional args result
          ansible.builtin.assert:
            that:
              - exasol_query_positional is not changed
              - exasol_query_positional.query_result[0].A | string == "42"

        - name: Scenario - named args bind correctly
          exasol.exasol.exasol_query:
            query: SELECT :n AS A
            named_args:
              n: 7
          register: exasol_query_named

        - name: Verify named args result
          ansible.builtin.assert:
            that:
              - exasol_query_named is not changed
              - exasol_query_named.query_result[0].A | string == "7"

        - name: Scenario - SELECT succeeds in check mode and does not change
          exasol.exasol.exasol_query:
            query: SELECT 1 AS A
          check_mode: true
          register: exasol_query_check_mode_select

        - name: Verify check mode SELECT result
          ansible.builtin.assert:
            that:
              - exasol_query_check_mode_select is not changed
              - exasol_query_check_mode_select.query_result | length == 1
              - exasol_query_check_mode_select.query_result[0].A | string == "1"

        - name: Scenario - DDL in check mode reports change without execution
          exasol.exasol.exasol_query:
            query: CREATE SCHEMA {{ test_schema }}_CHECK_MODE
          check_mode: true
          register: exasol_query_check_mode_ddl

        - name: Verify check mode DDL result
          ansible.builtin.assert:
            that:
              - exasol_query_check_mode_ddl is changed
              - exasol_query_check_mode_ddl.query_result == []
              - exasol_query_check_mode_ddl.query_all_results == []
              - exasol_query_check_mode_ddl.rowcount == []
              - exasol_query_check_mode_ddl.execution_time_ms == []

        - name: Verify check mode DDL did not create schema
          exasol.exasol.exasol_query:
            query: >-
              SELECT COUNT(*) AS SCHEMA_COUNT
              FROM EXA_SCHEMAS
              WHERE SCHEMA_NAME = '{{ test_schema }}_CHECK_MODE'
          register: exasol_query_check_mode_schema

        - name: Assert check mode DDL was not executed
          ansible.builtin.assert:
            that:
              - exasol_query_check_mode_schema.query_result[0].SCHEMA_COUNT | string == "0"

        - name: Scenario - bad credentials fail without leaking secrets
          exasol.exasol.exasol_query:
            login_host: "{{ login_host }}"
            login_port: "{{ login_port }}"
            login_user: "{{ login_user }}"
            login_password: "{{ invalid_login_password }}"
            validate_certs: "{{ validate_certs }}"
            certificate_fingerprint: "{{ certificate_fingerprint | default('') }}"
            query: SELECT 1 AS A
          register: exasol_query_bad_credentials
          ignore_errors: true

        - name: Verify bad credential error is sanitized
          ansible.builtin.assert:
            that:
              - exasol_query_bad_credentials is failed
              - "'authenticate' in exasol_query_bad_credentials.msg"
              - "invalid_login_password not in exasol_query_bad_credentials.msg"

        - name: Store exasol_query probe result
          ansible.builtin.set_fact:
            exasol_query_backend_probe:
              schema: "{{ test_schema }}"
              metadata_version_available: true
              single_select: "{{ exasol_query_select.query_result[0].A | string }}"
              batch_row_count: "{{ exasol_query_batch.query_result[0].ROW_COUNT | string }}"
              positional_value: "{{ exasol_query_positional.query_result[0].A | string }}"
              named_value: "{{ exasol_query_named.query_result[0].A | string }}"
              check_mode_select: >-
                {{ exasol_query_check_mode_select.query_result[0].A | string }}
              check_mode_schema_count: >-
                {{ exasol_query_check_mode_schema.query_result[0].SCHEMA_COUNT | string }}
              bad_credentials_sanitized: true
            cacheable: true

      always:
        - name: Post-clean exasol_query backend test schemas
          exasol.exasol.exasol_query:
            query:
              - DROP SCHEMA IF EXISTS {{ test_schema }} CASCADE
              - DROP SCHEMA IF EXISTS {{ test_schema }}_CHECK_MODE CASCADE
          ignore_errors: true
