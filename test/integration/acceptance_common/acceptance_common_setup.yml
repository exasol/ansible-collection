---
- name: Setup Exasol test environment
  ansible.builtin.import_role:
    name: exasol.exasol.setup_exasol
  vars:
    exasol_host: "{{ login_host }}"
    exasol_port: "{{ login_port }}"
    exasol_user: "{{ login_user }}"
    exasol_password: "{{ login_password }}"
    exasol_validate_certs: "{{ validate_certs }}"
    exasol_certificate_fingerprint: "{{ certificate_fingerprint | default('') }}"

- name: Verify acceptance backend test identifiers are disposable
  ansible.builtin.assert:
    that: "{{ acceptance_disposable_name_assertions }}"
    fail_msg: "{{ acceptance_disposable_name_fail_msg }}"
    quiet: true
