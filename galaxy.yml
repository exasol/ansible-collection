namespace: exasol
name: exasol
version: "0.3.0"
readme: README.md
authors:
  - Exasol AG <opensource@exasol.com>
description: Ansible Collection for automating Exasol database operations.
license_file: LICENSE
tags:
  - exasol
  - database
  - analytics
  - datawarehouse
repository: https://github.com/exasol/ansible-collection
issues: https://github.com/exasol/ansible-collection/issues
dependencies: {}
manifest:
  directives:
    - global-exclude *
    - include LICENSE
    - include README.md
    - include requirements.txt
    - recursive-include meta *
    - recursive-include plugins *
    - recursive-include roles *
