# This workflow is seeded by the PTB for new projects, but after creation it is
# owned and maintained by the project.
name: Slow-Checks

on:
  workflow_call:

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "2.3.0"

jobs:
  check-ansible-collection:
    name: Check Ansible Collection
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: actions/checkout@v6

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v8
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Build Collection
        id: build-collection
        run: poetry run -- nox -s collection:build

      - name: Run Collection Sanity
        id: run-collection-sanity
        run: poetry run -- nox -s collection:sanity

      - name: Run Collection Integration
        run: poetry run nox -s collection:integration

      - name: Run Pytest Integration Tests
        run: poetry run pytest test/integration -v

  build-matrix:
    name: Build Matrix
    uses: ./.github/workflows/matrix-all.yml
    permissions:
      contents: read

  run-integration-tests:
    name: Run Integration Tests (Python-${{ matrix.python-version }}, Exasol-${{ matrix.exasol-version}})
    needs:
      - build-matrix
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: actions/checkout@v6

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v8
        with:
          python-version: ${{ matrix.python-version }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Run Integration Tests
        id: run-integration-tests
        run: poetry run -- nox -s test:integration -- --coverage --db-version ${{ matrix.exasol-version }}

      - name: Upload Artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python${{ matrix.python-version }}-exasol${{ matrix.exasol-version }}-slow
          path: .coverage
          include-hidden-files: true
          overwrite: false
