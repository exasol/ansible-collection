# This workflow is seeded by the PTB for new projects, but after creation it is
# owned and maintained by the project.
name: Slow-Checks

on:
  workflow_call:

env:
  POETRY_VERSION: "2.3.0"

jobs:
  build-matrix:
    name: Build Matrix
    uses: ./.github/workflows/matrix.yml
    with:
      matrix_keys_json: '["exasol_versions", "python_versions"]'
    permissions:
      contents: read

  run-integration-tests:
    name: Run Integration Tests (Python-${{ matrix.python_versions }}, Exasol-${{ matrix.exasol_versions}})
    needs:
      - build-matrix
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - name: Check out Repository
        id: check-out-repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python & Poetry Environment
        id: set-up-python-and-poetry-environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v10
        with:
          python-version: ${{ matrix.python_versions }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Build Collection
        id: build-collection
        run: poetry run -- nox -s collection:build

      - name: Run Collection Sanity
        id: run-collection-sanity
        run: poetry run -- nox -s collection:sanity

      - name: Run Collection Integration
        id: run-collection-integration
        run: poetry run -- nox -s collection:integration

      - name: Run Integration Tests
        id: run-integration-tests
        run: poetry run -- nox -s test:integration -- --coverage --db-version ${{ matrix.exasol_versions }} --backend=onprem --itde-db-version ${{ matrix.exasol_versions }}

      - name: Upload Artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python${{ matrix.python_versions }}-exasol${{ matrix.exasol_versions }}-slow
          path: .coverage
          include-hidden-files: true
          overwrite: false
